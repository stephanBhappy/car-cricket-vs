[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Vite outputs content-hashed filenames — safe to cache permanently at the CDN edge
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML must always be fresh so new deploys are picked up immediately
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache"

# SPA rewrite: serve index.html for all routes without an HTTP redirect round-trip
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "npm run build"
  publish = "dist"
